name: notion
version: 0.1.0
dsl_version: 3
backend: file
description: Notion workspace data
tables:
  - name: pages
    description: Notion pages table
    format: jsonl
    source:
      location: file:///app/data/notion/
    columns:
      - name: page_id
        type: Utf8
      - name: title
        type: Utf8
      - name: type
        type: Utf8
      - name: content
        type: Utf8
      - name: tags
        type: Json
      - name: last_edited
        type: Utf8
