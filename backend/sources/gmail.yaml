name: gmail
version: 0.1.0
dsl_version: 3
backend: file
description: Gmail email data
tables:
  - name: inbox
    description: Gmail inbox messages
    format: jsonl
    source:
      location: file:///app/data/gmail/
    columns:
      - name: id
        type: Utf8
      - name: from
        type: Utf8
      - name: to
        type: Utf8
      - name: subject
        type: Utf8
      - name: snippet
        type: Utf8
      - name: date
        type: Utf8
      - name: labels
        type: Json
      - name: thread_id
        type: Utf8
  - name: sent
    description: Gmail sent messages
    format: jsonl
    source:
      location: file:///app/data/gmail/
    columns:
      - name: id
        type: Utf8
      - name: from
        type: Utf8
      - name: to
        type: Utf8
      - name: subject
        type: Utf8
      - name: snippet
        type: Utf8
      - name: date
        type: Utf8
      - name: thread_id
        type: Utf8
