name: jobs
version: 0.1.0
dsl_version: 3
backend: file
description: Job listings database
tables:
  - name: listings
    description: Job listings table
    format: jsonl
    source:
      location: file:///app/data/jobs/
    columns:
      - name: job_id
        type: Utf8
      - name: title
        type: Utf8
      - name: company
        type: Utf8
      - name: location
        type: Utf8
      - name: salary_min
        type: Int64
      - name: salary_max
        type: Int64
      - name: description
        type: Utf8
      - name: requirements
        type: Json
      - name: experience_level
        type: Utf8
      - name: job_type
        type: Utf8
      - name: url
        type: Utf8
      - name: posted_date
        type: Utf8
      - name: source
        type: Utf8
