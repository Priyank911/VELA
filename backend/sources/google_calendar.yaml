name: google_calendar
version: 0.1.0
dsl_version: 3
backend: file
description: Google Calendar events
tables:
  - name: events
    description: Google Calendar events table
    format: jsonl
    source:
      location: file:///app/data/google_calendar/
    columns:
      - name: id
        type: Utf8
      - name: summary
        type: Utf8
      - name: description
        type: Utf8
      - name: start_datetime
        type: Utf8
      - name: end_datetime
        type: Utf8
      - name: location
        type: Utf8
      - name: attendees
        type: Json
      - name: status
        type: Utf8
