version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: vela-postgres
    environment:
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: vela_dev_password
      POSTGRES_DB: vela
    ports:
      - "5432:5432"
    volumes:
      - vela_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vela-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # To use SQLite instead of Postgres, uncomment the line below and comment out the Postgres DATABASE_URL
      # - DATABASE_URL=sqlite+aiosqlite:///./vela.db
      - DATABASE_URL=postgresql+asyncpg://vela:vela_dev_password@postgres:5432/vela
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:${BACKEND_PORT:-8000}
    container_name: vela-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vela_pgdata:
